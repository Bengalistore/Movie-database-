<!DOCTYPE html>
<html>
<body style="background:#111;color:#fff;">

<div id="movie"></div>

<script>
const API = "https://movie-database-chi.vercel.app";

const id = window.location.pathname.split("/").pop();

async function loadMovie() {
  const res = await fetch(API + "/movie-data/" + id);
  const m = await res.json();

  document.getElementById("movie").innerHTML = `
    <h1>${m.title}</h1>
    <img src="${m.poster}" width="200">
    <p>Release: ${m.releaseDate}</p>
    <p>Views: ${m.views}</p>
  `;
}

loadMovie();
</script>

</body>
</html>
